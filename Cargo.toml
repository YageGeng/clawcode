[workspace]
resolver = "3"
members = ["crates/*"]
exclude = ["crates/proxy"]

[workspace.dependencies]
# error handling
snafu = { version = "0.9", features = ["backtrace"] }
libc = { version = "0.2" }

# json
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1" }
schemars = { version = "1" }

# http request
reqwest-eventsource = { version = "0.6" }
reqwest = { version = "0.13", features = ["json", "stream", "multipart", "charset"] }
eventsource-stream = { version = "0.2" }

# async
tokio = "1"
bytes = { version = "1" }
futures = { version = "0.3" }
futures-util = { version = "0.3" }
async-stream = { version = "0.3" }
pin-project-lite = "0.2"
async-trait = "0.1"

chrono = { version = "0.4", default-features = false, features = ["clock", "std", "serde"] }
nanoid = "0.4"
mime = "0.3"
mime_guess = "2"

tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
uuid = { version = "1", features = ["v4", "serde"] }
