# current_model = "openai/gpt-5.4"
current_model = "deepseek/deepseek-v4-pro"

[[llm.providers]]
id = "openai"
display_name = "Codex"
protocols = ["openai"]
base_url = "https://chatgpt.com/backend-api/codex"
api_key = { type = "auth" }

[[llm.providers.models]]
id = "gpt-5.4"
display_name = "GPT 5.4 Codex"

[llm.providers.models.extra_param.reasoning]
effort = "xhigh"
summary = "auto"

[[llm.providers]]
id = "deepseek"
display_name = "DeepSeek"
protocols = ["deepseek"]
base_url = "https://api.deepseek.com"
api_key = { type = "env", name = "DEEPSEEK_API_KEY" }

[[llm.providers.models]]
id = "deepseek-v4-pro"
display_name = "DeepSeek V4 Pro"

[llm.providers.models.extra_param]
reasoning_effort = "max"
thinking = { type = "enabled"}

[skills]
enabled = true
cwd = "."
roots = []

[runtime]
max_subagent_depth = 2

[approval]
profile = "trust_all"

[persistence]
enabled = true
