# Active model in "provider_id/model_id" format.
active_model = "deepseek/deepseek-v4-flash"
# active_model = "deepseek/deepseek-v4-pro"
# active_model = "chatgpt/gpt-5.4"
# active_model = "xiaomimimo/mimo-v2.5-pro"

# Approval strategy to use.
approval = "yolo"

[tui]
theme = "light"

[multi_agent]
max_threads = 100

[[providers]]
id = "openai"
display_name = "OpenAI"
provider_type = "responses"
base_url = "https://api.openai.com/v1"

[providers.api_key]
env = "OPENAI_API_KEY"

[[providers.models]]
id = "gpt-5.5"
display_name = "GPT-5.5"
context_tokens = 270000
max_output_tokens = 128000

[providers.models.extra_param]
reasoning = { effort = "high", summary = "auto" }

[[providers.models]]
id = "gpt-5.4"
display_name = "GPT-5.4"
context_tokens = 270000
max_output_tokens = 128000

[providers.models.extra_param]
reasoning = { effort = "high", summary = "auto" }

[[providers]]
id = "chatgpt"
display_name = "ChatGPT"
provider_type = "responses"
base_url = "https://chatgpt.com/backend-api/codex"
auth = { type = "codex" }

[[providers.models]]
id = "gpt-5.5"
display_name = "GPT-5.5"
context_tokens = 270000
max_output_tokens = 128000

[providers.models.extra_param]
reasoning = { effort = "high", summary = "auto" }

[[providers.models]]
id = "gpt-5.4"
display_name = "GPT-5.4"
context_tokens = 270000
max_output_tokens = 128000

[providers.models.extra_param]
reasoning = { effort = "high", summary = "auto" }

[[providers]]
id = "deepseek"
display_name = "DeepSeek"
provider_type = "openai-completions"
base_url = "https://api.deepseek.com"

[providers.api_key]
env = "DEEPSEEK_API_KEY"

[[providers.models]]
id = "deepseek-v4-flash"
display_name = "DeepSeek V4 Flash"
context_tokens = 1000000
max_output_tokens = 384000

[providers.models.extra_param]
thinking = { type = "enabled" }
reasoning_effort = "high"

[[providers.models]]
id = "deepseek-v4-pro"
display_name = "DeepSeek V4 Pro"
context_tokens = 1000000
max_output_tokens = 384000

[providers.models.extra_param]
thinking = { type = "enabled" }
reasoning_effort = "high"

[[providers]]
id = "xiaomimimo"
display_name = "Xiaomi MiMo"
provider_type = "anthropic"
base_url = "https://api.xiaomimimo.com/anthropic"

[providers.api_key]
env = "MIMO_API_KEY"

[[providers.models]]
id = "mimo-v2.5-pro"
display_name = "MiMo V2.5 Pro"
context_tokens = 1000000
max_output_tokens = 384000

[[providers.models]]
id = "mimo-v2.5"
display_name = "MiMo V2.5"
context_tokens = 1000000
max_output_tokens = 384000

[[mcp_servers]]
enabled = false
name = "filesystem"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "."]
