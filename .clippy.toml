# Clippy configuration — project-specific tuning
# Docs: https://doc.rust-lang.org/clippy/configuration.html

# Project-specific terms that are valid in documentation comments
doc-valid-idents = [
    "Clawcode", "TCP", "JSONL", "QuickJS",
    "Deserialize", "Serde", "Tokio", "Claude", "Anthropic",
    "LLM", "MCP", "ACP", "CLI", "TUI",
    "OpenCode", "Opus", "Sonnet", "Haiku",
    "UUID",
]

# This codebase has legitimate functions with many parameters
# (e.g. spawn_thread constructs many channel pairs at once)
too-many-arguments-threshold = 6

# Allow higher cognitive complexity — async turn execution is inherently complex
cognitive-complexity-threshold = 25

# Recognise .clawcode as a directory name in lints
allowed-dotfiles = [".clawcode"]

# Allow unwrap() in tests
allow-unwrap-in-tests = true
# Allow panic() in tests
allow-panic-in-tests = true
# Allow indexing/slicing in tests
allow-indexing-slicing-in-tests = true

# Ratatui colour discipline: semantic ANSI-only, no RGB/Indexed/hardcoded white/black/yellow.
# Mirrors the codex-rs clippy.toml style guide: prefer ANSI colours that adapt
# to the terminal theme, routed through broad semantic tokens.
disallowed-methods = [
    { path = "ratatui::style::Color::Rgb", reason = "Use semantic ANSI colors via the theme module (crates/tui/src/ui/theme)." },
    { path = "ratatui::style::Color::Indexed", reason = "Use semantic ANSI colors via the theme module (crates/tui/src/ui/theme)." },
    { path = "ratatui::style::Stylize::white", reason = "Avoid hardcoding white; prefer default fg or dim/bold." },
    { path = "ratatui::style::Stylize::black", reason = "Avoid hardcoding black; prefer default fg or dim/bold." },
    { path = "ratatui::style::Stylize::yellow", reason = "Avoid yellow; prefer other ANSI colours defined in the theme." },
]
